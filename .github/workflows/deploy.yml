name: Deploy to VPS

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-vps-main
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AppilicoShopServer.sln

      - name: Build
        run: dotnet build AppilicoShopServer.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AppilicoShopServer.sln --configuration Release --no-build --verbosity normal

      - name: Vulnerability scan
        run: dotnet list AppilicoShopServer.sln package --vulnerable --include-transitive

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: git archive --format=tar.gz --output=appilico-backend.tar.gz HEAD

      - name: Upload source archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: appilico-backend.tar.gz
          target: /tmp
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          command_timeout: 60m
          script: |
            set -euo pipefail

            deploy_root=/opt/appilico
            current_dir="$deploy_root/backend"
            release_dir="$deploy_root/backend.next"
            backup_dir="$deploy_root/backend.previous"
            archive=/tmp/appilico-backend.tar.gz

            repair_nginx() {
              if [ -d "$deploy_root/nginx/conf.d" ]; then
                sed -i \
                  -e 's/api:5000/api:8080/g' \
                  -e 's/backend:8080/api:8080/g' \
                  "$deploy_root"/nginx/conf.d/*.conf 2>/dev/null || true
                rm -f "$deploy_root"/nginx/conf.d/*.bak "$deploy_root"/nginx/conf.d/*.backup 2>/dev/null || true
              fi

              if docker ps -a --format '{{.Names}}' | grep -qx appilico-nginx; then
                api_container_for_nginx=$(docker compose ps -q api 2>/dev/null || true)
                if [ -n "$api_container_for_nginx" ]; then
                  api_network=$(docker inspect "$api_container_for_nginx" --format '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}' 2>/dev/null | head -n 1)
                  if [ -n "$api_network" ]; then
                    docker network connect "$api_network" appilico-nginx || true
                  fi
                fi
                docker restart appilico-nginx || true
              fi
            }

            ensure_runtime_config() {
              touch .env
              current_jwt=$(grep -m1 '^JWT_SECRET=' .env 2>/dev/null | cut -d= -f2- || true)
              if [ ${#current_jwt} -lt 32 ] || printf '%s' "$current_jwt" | grep -Eqi 'placeholder|will-be-overridden|development'; then
                new_jwt=$(openssl rand -base64 64 | tr -d '\n')
                if grep -q '^JWT_SECRET=' .env; then
                  sed -i "s|^JWT_SECRET=.*|JWT_SECRET=$new_jwt|" .env
                else
                  printf '\nJWT_SECRET=%s\n' "$new_jwt" >> .env
                fi
              fi
              chmod 600 .env

              printf '%s\n' \
                'services:' \
                '  api:' \
                '    environment:' \
                '      ASPNETCORE_ENVIRONMENT: Production' \
                '      ASPNETCORE_URLS: http://+:8080' \
                '      JWT__Secret: ${JWT_SECRET}' \
                '      JWT__Issuer: AppilicoShopServer' \
                '      JWT__Audience: Appilico.Client' \
                > docker-compose.override.yml
            }

            remove_stale_api_containers() {
              docker compose rm -sf api 2>/dev/null || true
              stale_api_containers=$(docker ps -aq --filter "name=appilico-api" 2>/dev/null || true)
              if [ -n "$stale_api_containers" ]; then
                docker rm -f $stale_api_containers || true
              fi
            }

            rollback() {
              exit_code=$?
              if [ "$exit_code" -ne 0 ] && [ -d "$backup_dir" ]; then
                echo "Deployment failed; rolling back source and API container."
                rm -rf "$current_dir"
                mv "$backup_dir" "$current_dir"
                cd "$deploy_root"
                remove_stale_api_containers
                docker compose up -d --build api || true
                repair_nginx || true
              fi
              exit "$exit_code"
            }
            trap rollback EXIT

            echo "Preparing backend source from Actions archive"
            rm -rf "$release_dir"
            mkdir -p "$release_dir"
            tar -xzf "$archive" -C "$release_dir"
            rm -f "$archive"

            rm -rf "$backup_dir"
            if [ -d "$current_dir" ]; then
              mv "$current_dir" "$backup_dir"
            fi
            mv "$release_dir" "$current_dir"

            cd "$deploy_root"
            sed -i 's/ASPNETCORE_ENVIRONMENT=Development/ASPNETCORE_ENVIRONMENT=Production/g' docker-compose.yml .env 2>/dev/null || true
            ensure_runtime_config

            echo "Building api service"
            docker compose build api

            echo "Starting api service"
            remove_stale_api_containers
            docker compose up -d api
            api_container=$(docker compose ps -q api)
            for attempt in $(seq 1 40); do
              status=$(docker inspect --format='{{.State.Health.Status}}' "$api_container" 2>/dev/null || echo starting)
              if [ "$status" = "healthy" ]; then
                break
              fi
              if [ "$attempt" = "40" ]; then
                docker compose logs --tail=100 api
                exit 1
              fi
              sleep 3
            done

            repair_nginx
            rm -rf "$backup_dir"
            echo "Deployed at $(date)"
