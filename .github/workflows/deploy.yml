name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AppilicoShopServer.sln

      - name: Build
        run: dotnet build AppilicoShopServer.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AppilicoShopServer.sln --configuration Release --no-build --verbosity normal

      - name: Vulnerability scan
        run: dotnet list AppilicoShopServer.sln package --vulnerable --include-transitive

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/appilico/server
            git pull origin main
            cd /opt/appilico
            docker compose up -d --build backend
            backend_container=$(docker compose ps -q backend)
            for attempt in $(seq 1 20); do
              status=$(docker inspect --format='{{.State.Health.Status}}' "$backend_container" 2>/dev/null || echo starting)
              if [ "$status" = "healthy" ]; then
                break
              fi
              if [ "$attempt" = "20" ]; then
                docker compose logs --tail=100 backend
                exit 1
              fi
              sleep 3
            done
            docker compose restart nginx
            echo "Deployed at $(date)"
