name: VPS Diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect VPS API and nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: false
          command_timeout: 5m
          script: |
            set -u

            echo "== host =="
            hostname
            date -u

            echo "== containers =="
            docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}'

            cd /opt/appilico || exit 0

            echo "== compose ps =="
            docker compose ps || true

            echo "== api inspect =="
            docker inspect appilico-api-1 --format 'status={{.State.Status}} health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}} exit={{.State.ExitCode}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' || true

            echo "== api environment =="
            docker exec appilico-api-1 sh -lc 'printf "ASPNETCORE_ENVIRONMENT=%s\n" "$ASPNETCORE_ENVIRONMENT"; printf "ASPNETCORE_URLS=%s\n" "$ASPNETCORE_URLS"; printf "PORT=%s\n" "$PORT"' || true

            echo "== api listeners and probes =="
            docker exec appilico-api-1 sh -lc 'ss -ltnp 2>/dev/null || netstat -ltnp 2>/dev/null || true; curl -v --max-time 8 http://127.0.0.1:8080/health/live || true; echo; curl -v --max-time 8 http://127.0.0.1:5000/health/live || true' || true

            echo "== api logs =="
            docker compose logs --tail=260 api || true

            echo "== nginx inspect =="
            docker inspect appilico-nginx --format 'status={{.State.Status}} networks={{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}' || true

            echo "== nginx logs =="
            docker logs --tail=120 appilico-nginx || true

            echo "== nginx config test =="
            docker exec appilico-nginx nginx -t || true
