name: VPS Diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect VPS containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: false
          command_timeout: 10m
          script: |
            set -u

            echo "== host =="
            hostname
            date -u

            echo "== containers =="
            docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}'

            echo "== compose ps =="
            cd /opt/appilico || exit 0
            echo "== repair compose environment =="
            sed -i 's/ASPNETCORE_ENVIRONMENT=Development/ASPNETCORE_ENVIRONMENT=Production/g' docker-compose.yml .env 2>/dev/null || true
            docker compose up -d api || true
            docker compose ps

            echo "== listeners =="
            ss -ltnp | grep -E ':(80|443|5000|8080)\b' || true

            echo "== local probes =="
            docker exec appilico-api-1 curl -fsS --max-time 15 http://127.0.0.1:8080/health/live || true
            echo
            docker exec appilico-api-1 curl -fsS --max-time 15 http://127.0.0.1:8080/api/storefront/config || true
            echo

            echo "== api logs =="
            docker compose logs --tail=160 api || true

            echo "== nginx logs =="
            docker logs --tail=120 appilico-nginx || true

            echo "== nginx config test =="
            docker exec appilico-nginx nginx -t || true

            echo "== repair nginx upstream =="
            grep -R -n -E 'api:5000|backend:8080|api:8080|proxy_pass|upstream' /opt/appilico/nginx/conf.d || true
            sed -i.bak \
              -e 's/api:5000/api:8080/g' \
              -e 's/backend:8080/api:8080/g' \
              /opt/appilico/nginx/conf.d/*.conf
            rm -f /opt/appilico/nginx/conf.d/*.bak /opt/appilico/nginx/conf.d/*.backup
            grep -R -n -E 'api:5000|backend:8080|api:8080|proxy_pass|upstream' /opt/appilico/nginx/conf.d || true

            echo "== recreate nginx =="
            cd /opt/appilico || exit 0
            docker compose up -d --force-recreate nginx || docker restart appilico-nginx || true

            echo "== connect nginx to api network =="
            api_network=$(docker inspect appilico-api-1 --format '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}' | head -n 1)
            if [ -n "$api_network" ]; then
              docker network connect "$api_network" appilico-nginx || true
            fi
            docker inspect appilico-nginx --format '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}' || true
            docker restart appilico-nginx || true
            docker exec appilico-nginx nginx -t || true

            echo "== post-restart containers =="
            docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}'