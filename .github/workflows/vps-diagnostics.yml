name: VPS Diagnostics

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect VPS layout
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: false
          script: |
            set -u
            echo "whoami=$(whoami)"
            echo "pwd=$(pwd)"
            echo "---- /opt ----"
            ls -la /opt || true
            echo "---- /opt/appilico ----"
            ls -la /opt/appilico || true
            echo "---- git repos under /opt ----"
            find /opt -maxdepth 4 -type d -name .git -print 2>/dev/null | sed 's#/.git$##' || true
            echo "---- compose files under /opt ----"
            find /opt -maxdepth 4 \( -name 'docker-compose.yml' -o -name 'docker-compose.yaml' -o -name 'compose.yml' -o -name 'compose.yaml' \) -print 2>/dev/null || true
            echo "---- compose services ----"
            for compose_file in $(find /opt -maxdepth 4 \( -name 'docker-compose.yml' -o -name 'docker-compose.yaml' -o -name 'compose.yml' -o -name 'compose.yaml' \) -print 2>/dev/null); do
              echo "FILE=$compose_file"
              docker compose -f "$compose_file" config --services || true
            done
            echo "---- running containers ----"
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}' || true
