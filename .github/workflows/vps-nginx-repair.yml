name: Repair VPS nginx

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repair-nginx:
    runs-on: ubuntu-latest
    steps:
      - name: Repair nginx via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail

            deploy_root=/opt/appilico
            cd "$deploy_root"

            if [ -d "$deploy_root/nginx/conf.d" ]; then
              sed -i \
                -e 's/api:5000/api:8080/g' \
                -e 's/backend:8080/api:8080/g' \
                "$deploy_root"/nginx/conf.d/*.conf 2>/dev/null || true
              rm -f "$deploy_root"/nginx/conf.d/*.bak "$deploy_root"/nginx/conf.d/*.backup 2>/dev/null || true
            fi

            api_container=$(docker compose ps -q api 2>/dev/null || true)
            if [ -z "$api_container" ]; then
              docker compose up -d api || true
              api_container=$(docker compose ps -q api 2>/dev/null || true)
            fi

            api_network=""
            if [ -n "$api_container" ]; then
              api_network=$(docker inspect "$api_container" --format '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}' 2>/dev/null | head -n 1)
            fi
            if [ -z "$api_network" ]; then
              api_network=$(docker network ls --format '{{.Name}}' | grep -m1 '^appilico' || true)
            fi

            certbot_webroot_volume=$(docker volume ls --format '{{.Name}}' | grep -m1 'certbot_webroot$' || true)
            certbot_certs_volume=$(docker volume ls --format '{{.Name}}' | grep -m1 'certbot_certs$' || true)

            echo "api_network=$api_network"
            echo "certbot_webroot_volume=$certbot_webroot_volume"
            echo "certbot_certs_volume=$certbot_certs_volume"
            echo "host_webroot_dir=$(test -d /var/www/certbot && echo present || echo missing)"
            echo "host_letsencrypt_dir=$(test -d /etc/letsencrypt && echo present || echo missing)"
            echo "host_certificate=$(test -f /etc/letsencrypt/live/api.appilico.com/fullchain.pem && echo present || echo missing)"
            docker volume ls --format '{{.Name}}' | grep -E 'certbot|letsencrypt|appilico' || true
            find "$deploy_root/nginx/conf.d" -maxdepth 1 -type f -print 2>/dev/null || true
            for config_file in "$deploy_root"/nginx/conf.d/*.conf; do
              [ -f "$config_file" ] || continue
              echo "--- $config_file ---"
              sed -n '1,180p' "$config_file"
            done

            docker rm -f appilico-nginx 2>/dev/null || true

            nginx_args="--name appilico-nginx --restart unless-stopped -p 80:80 -p 443:443"
            if [ -n "$api_network" ]; then
              nginx_args="$nginx_args --network $api_network"
            fi
            if [ -d "$deploy_root/nginx/conf.d" ]; then
              nginx_args="$nginx_args -v $deploy_root/nginx/conf.d:/etc/nginx/conf.d:ro"
            fi
            if [ -n "$certbot_webroot_volume" ]; then
              nginx_args="$nginx_args -v $certbot_webroot_volume:/var/www/certbot:ro"
            elif [ -d /var/www/certbot ]; then
              nginx_args="$nginx_args -v /var/www/certbot:/var/www/certbot:ro"
            fi
            if [ -n "$certbot_certs_volume" ]; then
              nginx_args="$nginx_args -v $certbot_certs_volume:/etc/letsencrypt:ro"
            elif [ -d /etc/letsencrypt ]; then
              nginx_args="$nginx_args -v /etc/letsencrypt:/etc/letsencrypt:ro"
            fi

            docker run -d $nginx_args nginx:alpine
            docker inspect appilico-nginx --format 'status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}}'
            docker logs --tail=100 appilico-nginx || true
            if [ "$(docker inspect appilico-nginx --format '{{.State.Status}}')" != "running" ]; then
              docker logs --tail=100 appilico-nginx || true
              exit 1
            fi
            docker exec appilico-nginx nginx -t || {
              docker inspect appilico-nginx --format 'status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}}' || true
              docker logs --tail=100 appilico-nginx || true
              exit 1
            }
            docker restart appilico-nginx || {
              docker inspect appilico-nginx --format 'status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}}' || true
              docker logs --tail=100 appilico-nginx || true
              exit 1
            }
            docker ps --filter name=appilico-nginx --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            curl -kfsS --resolve api.appilico.com:443:127.0.0.1 https://api.appilico.com/health/live \
              || curl -fsS http://localhost/health/live