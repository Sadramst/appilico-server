services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=appilicodb;Username=appilico;Password=YourStr0ng!Passw0rd;
      - JWT__Secret=YourSuperSecretKeyThatIsAtLeast32CharactersLong!
      - JWT__Issuer=Appilico
      - JWT__Audience=AppilicoApp
      - Cloudinary__CloudName=your-cloud-name
      - Cloudinary__ApiKey=your-api-key
      - Cloudinary__ApiSecret=your-api-secret
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=appilicodb
      - POSTGRES_USER=appilico
      - POSTGRES_PASSWORD=YourStr0ng!Passw0rd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appilico -d appilicodb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
